<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Present Simple – Grammar Games</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pale-sky:#bfe0f3; --peach-fuzz:#ffc9b5; --wisteria-blue:#8c9eff;
  --lemon-lime:#cbd538; --jungle-teal:#478978; --deep-pink:#ee55a5;
  --bg:#0d0d1a; --bg2:#13132a; --card:#1a1a38; --card2:#20204a;
  --text:#e8e8f8; --dim:#7878a8; --white:#fff;
  --ok:#4cde80; --fail:#ff4d6d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.screen{display:none;flex:1;flex-direction:column;}
.screen.on{display:flex;}

/* HUB */
#hub{padding:0 16px 40px;max-width:780px;margin:0 auto;width:100%;}
.hub-head{text-align:center;padding:36px 0 28px;}
.hub-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,5vw,3rem);
  background:linear-gradient(135deg,var(--pale-sky),var(--wisteria-blue),var(--deep-pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.hub-sub{color:var(--dim);font-size:1rem;margin-top:6px;}
.stages{display:flex;flex-direction:column;gap:14px;}
.stage{background:var(--card);border-radius:22px;padding:20px 22px;border:2px solid transparent;transition:transform .2s,box-shadow .2s;}
.stage:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.stage-1{border-color:var(--pale-sky);}.stage-2{border-color:var(--peach-fuzz);}
.stage-3{border-color:var(--wisteria-blue);}.stage-4{border-color:var(--lemon-lime);}
.stage-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.stage-emoji{font-size:1.8rem;}
.stage-name{font-family:'Fredoka One',cursive;font-size:1.25rem;}
.stage-name small{display:block;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:600;opacity:.6;}
.stage-games{display:flex;gap:10px;flex-wrap:wrap;}
.game-btn{padding:9px 18px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;
  font-size:.85rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;white-space:nowrap;}
.game-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.game-btn:active{transform:scale(.96);}
.g-sky{background:var(--pale-sky);color:#1a4a6a;}.g-peach{background:var(--peach-fuzz);color:#7a2a10;}
.g-wisteria{background:var(--wisteria-blue);color:#1a1a6a;}.g-lime{background:var(--lemon-lime);color:#2a3000;}
.g-teal{background:var(--jungle-teal);color:#fff;}.g-pink{background:var(--deep-pink);color:#fff;}

/* GAME WRAPPER */
#game-wrapper{flex:1;display:flex;flex-direction:column;}
#topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg2);
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
#btn-back{background:rgba(255,255,255,.08);border:none;color:var(--text);padding:8px 16px;
  border-radius:50px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;transition:background .2s;}
#btn-back:hover{background:rgba(255,255,255,.15);}
#game-title-bar{font-family:'Fredoka One',cursive;font-size:1.05rem;flex:1;}
#game-score-bar{font-weight:800;color:var(--lemon-lime);font-size:.95rem;}
#lives-bar{font-size:1.1rem;letter-spacing:2px;}
#game-area{flex:1;padding:16px;overflow-y:auto;max-width:860px;margin:0 auto;width:100%;}

/* COMMON */
.game-card{background:var(--card);border-radius:20px;padding:22px;margin-bottom:14px;}
.g-instr{text-align:center;color:var(--dim);font-size:.95rem;margin-bottom:16px;line-height:1.5;}
.g-instr span{color:var(--peach-fuzz);font-weight:700;}
.g-instr em{color:var(--pale-sky);font-style:normal;}
.big-label{text-align:center;font-family:'Fredoka One',cursive;font-size:2.2rem;margin:16px 0;}
.progress-strip{display:flex;gap:6px;justify-content:center;margin:10px 0;}
.prog-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s;}
.prog-dot.done{background:var(--lemon-lime);}.prog-dot.curr{background:var(--pale-sky);}
.timer-wrap{height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin:10px 0;}
.timer-bar{height:100%;border-radius:4px;background:var(--lemon-lime);transition:width .12s linear;}
.choices{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
.choice{padding:13px 28px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;
  font-size:1.1rem;font-weight:900;cursor:pointer;transition:transform .15s;}
.choice:hover{transform:scale(1.06);}.choice:active{transform:scale(.94);}
.choice.c-ok{background:var(--ok)!important;color:#003320!important;}
.choice.c-fail{background:var(--fail)!important;color:#fff!important;}
.gap-sentence{text-align:center;font-size:1.3rem;font-weight:700;min-height:56px;
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px;margin:16px 0;line-height:1.6;}
.gap{display:inline-block;min-width:80px;height:34px;background:rgba(255,255,255,.08);
  border-bottom:3px solid var(--wisteria-blue);border-radius:6px;text-align:center;
  line-height:34px;color:var(--wisteria-blue);font-weight:900;margin:0 4px;}
.bank{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:14px 0;}
.bank-chip{padding:10px 20px;border-radius:12px;border:2px solid;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:900;cursor:pointer;transition:all .15s;user-select:none;}
.bank-chip:hover{transform:scale(1.06);}.bank-chip.sel{box-shadow:0 0 0 3px #fff;}
.rule-tbl{width:100%;border-collapse:collapse;margin:12px 0;font-size:.95rem;}
.rule-tbl th{padding:10px 14px;background:rgba(140,158,255,.2);color:var(--wisteria-blue);
  font-weight:800;border:1px solid rgba(255,255,255,.08);text-align:center;}
.rule-tbl td{padding:10px 14px;border:1px solid rgba(255,255,255,.08);text-align:center;vertical-align:middle;}
.rule-tbl tr:nth-child(even) td{background:rgba(255,255,255,.03);}
td.blank{background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.3)!important;
  cursor:pointer;transition:all .2s;min-width:70px;color:var(--dim);}
td.blank:hover{border-color:var(--pale-sky)!important;background:rgba(191,224,243,.1);}
td.blank.filled{border-style:solid!important;color:var(--text);}
td.blank.ok{border-color:var(--ok)!important;background:rgba(76,222,128,.15)!important;color:var(--ok);}
td.blank.wrong{border-color:var(--fail)!important;background:rgba(255,77,109,.15)!important;color:var(--fail);}

/* SUBJECT FINDER */
.sf-sent{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0;}
.word-pill{padding:9px 16px;border-radius:10px;border:2px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);color:var(--text);font-family:'Nunito',sans-serif;
  font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .15s;line-height:1.4;}
.word-pill:hover{border-color:var(--pale-sky);background:rgba(191,224,243,.15);transform:translateY(-2px);}
.word-pill.ok{background:rgba(76,222,128,.25);border-color:var(--ok);color:#a5f0c0;cursor:default;}
.word-pill.fail{background:rgba(255,77,109,.22);border-color:var(--fail);}
.word-pill.sel{background:rgba(140,158,255,.25);border-color:var(--wisteria-blue);color:var(--wisteria-blue);}
@keyframes wShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.word-pill.shake{animation:wShake .3s;}
.sf-hint{text-align:center;font-size:.92rem;color:var(--peach-fuzz);margin:8px 0;min-height:22px;line-height:1.4;}
.dif-selector{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0;}
.dif-btn{padding:14px 28px;border-radius:16px;border:2px solid;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;background:transparent;}
.dif-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.dif-easy{border-color:var(--ok);color:var(--ok);}
.dif-easy:hover{background:rgba(76,222,128,.15);}
.dif-med{border-color:var(--peach-fuzz);color:var(--peach-fuzz);}
.dif-med:hover{background:rgba(255,201,181,.15);}
.dif-hard{border-color:var(--fail);color:var(--fail);}
.dif-hard:hover{background:rgba(255,77,109,.15);}
.dif-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:800;margin-bottom:4px;}

/* ARENA */
.arena{position:relative;background:linear-gradient(180deg,#050514 0%,#0d0d30 100%);
  border-radius:18px;overflow:hidden;margin:12px 0;user-select:none;}
#speed-arena{height:180px;}
#scatch-arena{height:380px;}

/* SPEED */
.sp-bubble{position:absolute;border-radius:50px;padding:10px 22px;font-family:'Nunito',sans-serif;
  font-size:1.1rem;font-weight:900;cursor:pointer;white-space:nowrap;transition:transform .1s;
  border:2px solid rgba(255,255,255,.25);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.sp-bubble:hover{transform:scaleY(1.1)!important;}
.sp-bubble:active{transform:scale(.92)!important;}
@keyframes spawnPop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.sp-bubble.spawning{animation:spawnPop .2s ease-out forwards;}

/* S-CATCH */
.catch-ending{position:absolute;width:72px;height:72px;border-radius:16px;display:flex;
  align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1.3rem;
  cursor:pointer;border:3px solid rgba(255,255,255,.25);box-shadow:0 4px 18px rgba(0,0,0,.5);transition:transform .1s;}
.catch-ending:hover{transform:scale(1.12);}
@keyframes endExplode{0%{transform:scale(1);opacity:1}70%{transform:scale(2.2);opacity:.4}100%{transform:scale(0);opacity:0}}
.catch-ending.exploding{animation:endExplode .35s forwards;pointer-events:none;}
.verb-target{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--card2);border-radius:14px;padding:12px 32px;font-family:'Fredoka One',cursive;
  font-size:1.3rem;border:3px solid var(--wisteria-blue);white-space:nowrap;min-width:260px;text-align:center;
  box-shadow:0 4px 20px rgba(140,158,255,.3);}
.verb-highlight{color:var(--peach-fuzz);}
.catch-overlay{position:absolute;inset:0;background:rgba(5,5,20,.92);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:40;border-radius:18px;padding:20px;text-align:center;}
.catch-overlay-title{font-size:1rem;color:var(--fail);margin-bottom:8px;font-weight:700;}
.catch-overlay-ans{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--lemon-lime);line-height:1;}
.catch-overlay-word{font-size:1.1rem;color:var(--text);margin:8px 0;}
.catch-overlay-rule{background:rgba(255,255,255,.08);border-radius:10px;padding:10px 18px;
  font-size:.92rem;color:var(--peach-fuzz);margin-top:10px;line-height:1.5;max-width:300px;}

/* RESULT */
.result{text-align:center;padding:40px 20px;}
.result-emo{font-size:3.5rem;margin-bottom:12px;}
.result-title{font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:6px;}
.result-score{font-size:1.2rem;color:var(--lemon-lime);margin-bottom:6px;}
.result-stars{font-size:2rem;margin-bottom:24px;letter-spacing:4px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-ok{padding:13px 30px;border-radius:50px;border:none;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;}
.btn-ok:hover{transform:translateY(-2px);}
.btn-primary-game{background:var(--jungle-teal);color:#fff;}
.btn-secondary-game{background:rgba(255,255,255,.1);color:var(--text);}

/* FLASH */
@keyframes flashBg{0%{opacity:1}100%{opacity:0}}
.flash-ok,.flash-fail{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;}
.flash-ok{background:rgba(76,222,128,.12);}
.flash-fail{background:rgba(255,77,109,.16);}
.flash-ok.show,.flash-fail.show{animation:flashBg .4s ease-out;}

/* PARTICLES */
.particle{position:fixed;pointer-events:none;border-radius:50%;z-index:100;animation:pFly .7s ease-out forwards;}
@keyframes pFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

footer{text-align:center;padding:18px;color:var(--dim);font-size:.85rem;background:var(--bg2);
  border-top:1px solid rgba(255,255,255,.05);margin-top:auto;flex-shrink:0;}
footer span{color:var(--deep-pink);}
@media(max-width:540px){
  .hub-title{font-size:1.9rem;}#speed-arena{height:140px;}#scatch-arena{height:320px;}
  .catch-ending{width:60px;height:60px;font-size:1.1rem;}
}
</style>
</head>
<body>

<div class="flash-ok" id="flash-ok"></div>
<div class="flash-fail" id="flash-fail"></div>

<!-- ══ HUB ══ -->
<div id="S-hub" class="screen on">
<div id="hub">
  <div class="hub-head">
    <div class="hub-title">🎮 Grammar Quest</div>
    <div class="hub-sub">Present Simple — Scegli un gioco e parti! 🚀</div>
  </div>
  <div class="stages">

    <div class="stage stage-1">
      <div class="stage-top"><span class="stage-emoji">🎯</span>
        <div class="stage-name">Pronomi Soggetto<small>Subject Pronouns</small></div></div>
      <div class="stage-games">
        <button class="game-btn g-sky" onclick="loadGame('speed')">⚡ Speed Clicker</button>
      </div>
    </div>

    <div class="stage stage-2">
      <div class="stage-top"><span class="stage-emoji">🔍</span>
        <div class="stage-name">Trova il Soggetto<small>Find the Subject</small></div></div>
      <div class="stage-games">
        <button class="game-btn g-peach" onclick="loadGame('subject')">🎯 Subject Hunter</button>
      </div>
    </div>

    <div class="stage stage-3">
      <div class="stage-top"><span class="stage-emoji">💫</span>
        <div class="stage-name">Il Verbo TO BE<small>The Verb TO BE</small></div></div>
      <div class="stage-games">
        <button class="game-btn g-wisteria" onclick="loadGame('tobe-rule')">📋 La Regola</button>
        <button class="game-btn g-wisteria" onclick="loadGame('tobe-fire')">⚡ Quick Fire</button>
      </div>
    </div>

    <div class="stage stage-4">
      <div class="stage-top"><span class="stage-emoji">➕</span>
        <div class="stage-name">La -S di HE/SHE/IT<small>Third Person Spelling</small></div></div>
      <div class="stage-games">
        <button class="game-btn g-lime" onclick="loadGame('s-rule')">📋 La Regola</button>
        <button class="game-btn g-lime" onclick="loadGame('s-catch')">🎯 Acchiappa il Finale!</button>
      </div>
    </div>

  </div>
</div>
</div>

<!-- ══ GAME ══ -->
<div id="S-game" class="screen">
  <div id="topbar">
    <button id="btn-back" onclick="showHub()">← Torna</button>
    <span id="game-title-bar">–</span>
    <span id="lives-bar"></span>
    <span id="game-score-bar">⭐ 0</span>
  </div>
  <div id="game-area"></div>
</div>

<footer>Made with <span>♥</span> by Ms Fatigato</footer>

<script>
/* ── UTILS ── */
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(freq=440,dur=0.12,type='sine',vol=0.25){
  try{const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.start();o.stop(c.currentTime+dur);}catch(e){}
}
function playOk(){beep(660,.08);setTimeout(()=>beep(880,.12),70);}
function playFail(){beep(220,.25,'sawtooth',.2);}
function playWin(){[660,770,880,1100].forEach((f,i)=>setTimeout(()=>beep(f,.15),i*80));}
function burst(x,y,color){
  for(let i=0;i<10;i++){
    const p=document.createElement('div');p.className='particle';
    const a=Math.random()*Math.PI*2,r=50+Math.random()*80;
    p.style.cssText=`left:${x}px;top:${y}px;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;background:${color};--dx:${Math.cos(a)*r}px;--dy:${Math.sin(a)*r}px;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),800);
  }
}
function flash(type){const el=document.getElementById('flash-'+type);el.classList.remove('show');void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),400);}
function shuffle(a){return a.slice().sort(()=>Math.random()-.5);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

/* ── NAV ── */
let cleanupFn=null;
function showHub(){if(cleanupFn){cleanupFn();cleanupFn=null;}document.getElementById('S-hub').classList.add('on');document.getElementById('S-game').classList.remove('on');window.scrollTo(0,0);}
function loadGame(id){if(cleanupFn){cleanupFn();cleanupFn=null;}document.getElementById('S-hub').classList.remove('on');document.getElementById('S-game').classList.add('on');document.getElementById('game-area').innerHTML='';document.getElementById('lives-bar').textContent='';setScore(0,0);GAMES[id]&&GAMES[id]();window.scrollTo(0,0);}
function setTitle(t){document.getElementById('game-title-bar').textContent=t;}
function setScore(s,m){document.getElementById('game-score-bar').textContent=m?`⭐ ${s}/${m}`:`⭐ ${s}`;}
function setLives(n){document.getElementById('lives-bar').textContent='❤️'.repeat(Math.max(0,n))+'🖤'.repeat(Math.max(0,3-n));}
function getArea(){return document.getElementById('game-area');}

function showResult(score,max,replayId){
  const pct=max?score/max:1,stars=pct>=.8?3:pct>=.5?2:1;
  const msgs=['Continua così! Puoi farcela 💪','Quasi perfetto! Ancora un po\'! 🌟','FANTASTICO! Sei una stella! 🏆'];
  getArea().innerHTML=`<div class="result">
    <div class="result-emo">${pct>=.8?'🎉':pct>=.5?'😊':'😅'}</div>
    <div class="result-title">${msgs[stars-1]}</div>
    <div class="result-score">${score} / ${max} risposte corrette</div>
    <div class="result-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <div class="btn-row">
      <button class="btn-ok btn-primary-game" onclick="loadGame('${replayId}')">🔄 Riprova</button>
      <button class="btn-ok btn-secondary-game" onclick="showHub()">🏠 Hub</button>
    </div></div>`;
  if(pct>=.8)playWin();else playOk();
}

/* ── PALETTE ── */
const PC={I:'#bfe0f3',you:'#ffc9b5',he:'#8c9eff',she:'#ee55a5',it:'#cbd538',we:'#478978',they:'#a78bfa'};
const PCT={I:'#0a2a3a',you:'#5a1a00',he:'#0a0a40',she:'#fff',it:'#1a1a00',we:'#fff',they:'#fff'};
const ALL_PRONOUNS=['I','you','he','she','it','we','they'];

/* ════════════════════════════════════════════════════════
   GAME 1A – SPEED PRONOUNS
════════════════════════════════════════════════════════ */
const SUBJECTS=shuffle([
  {word:'Marco',emoji:'👦',pronoun:'he'},{word:'Sofia',emoji:'👧',pronoun:'she'},
  {word:'Billie Eilish',emoji:'🎤',pronoun:'she'},{word:'Alfa',emoji:'🎸',pronoun:'he'},
  {word:'the cat',emoji:'🐱',pronoun:'it'},{word:'my dog',emoji:'🐶',pronoun:'it'},
  {word:'Sofia and Luca',emoji:'👫',pronoun:'they'},{word:'Luca and I',emoji:'🤝',pronoun:'we'},
  {word:'the therapy dog',emoji:'🐕',pronoun:'it'},{word:'my sister',emoji:'👩',pronoun:'she'},
  {word:'my friends',emoji:'👥',pronoun:'they'},{word:'the ball',emoji:'⚽',pronoun:'it'},
  {word:'Ms Fatigato',emoji:'👩‍🏫',pronoun:'she'},{word:'a jockey',emoji:'🏇',pronoun:'he'},
  {word:'my brother',emoji:'🧒',pronoun:'he'},{word:'Taylor Swift',emoji:'🎵',pronoun:'she'},
  {word:'Cristiano Ronaldo',emoji:'⚽',pronoun:'he'},{word:'my parents',emoji:'👨‍👩‍👦',pronoun:'they'},
  {word:'the students',emoji:'🧑‍🎓',pronoun:'they'},{word:'my phone',emoji:'📱',pronoun:'it'},

const GAMES={};
GAMES['speed']=function(){
  setTitle('⚡ Speed Clicker');
  const area=getArea();
  let subIdx=0,score=0,attempts=0,speed=130,RAF=null,active=false,bubbles=[],timer=60,timerInt=null;
  const subjects=shuffle(SUBJECTS);let curr=subjects[subIdx];

  area.innerHTML=`<div class="game-card">
    <p class="g-instr">Il soggetto è mostrato sopra. <span>Clicca il pronome corretto</span> prima che scompaia!<br>
    <em>Vince chi fa più risposte esatte in 60 secondi! 🏆</em></p>
    <div id="speed-display" class="big-label">${curr.emoji} ${curr.word} → ?</div>
    <div class="arena" id="speed-arena"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding:0 4px;">
      <div style="color:var(--dim);font-size:.9rem;">⏱ <span id="s-timer">60</span>s</div>
      <div style="color:var(--dim);font-size:.9rem;">🚀 velocità: <span id="s-speed">1.0</span>x</div>
    </div></div>`;

  const arena=document.getElementById('speed-arena');
  document.getElementById('lives-bar').textContent='';
  setScore(0,0);

  function spawnBubbles(){
    bubbles.forEach(b=>b.el&&b.el.remove());bubbles=[];
    const arenaH=arena.clientHeight||180;
    shuffle(ALL_PRONOUNS).forEach((p,i)=>{
      const el=document.createElement('div');el.className='sp-bubble spawning';
      el.textContent=p;el.style.background=PC[p];el.style.color=PCT[p];
      el.style.left=(arena.clientWidth+20+i*60)+'px';
      el.style.top=Math.round(12+(arenaH-50)*Math.random())+'px';
      el.addEventListener('click',()=>handleClick(p,el));
      arena.appendChild(el);
      bubbles.push({el,x:arena.clientWidth+20+i*60,pronoun:p,active:true});
    });
  }

  function handleClick(p,el){
    if(!active)return;
    attempts++;
    const correctPronouns=Array.isArray(curr.pronouns)?curr.pronouns:[curr.pronoun];
    if(correctPronouns.includes(p)){
      score++;setScore(score,attempts);playOk();flash('ok');
      burst(el.getBoundingClientRect().left+30,el.getBoundingClientRect().top+20,PC[p]);
      el.style.transform='scale(2)';el.style.opacity='0';setTimeout(()=>el.remove(),300);
      speed=Math.min(speed+16,440);
      document.getElementById('s-speed').textContent=(speed/130).toFixed(1);
      subIdx=(subIdx+1)%subjects.length;curr=subjects[subIdx];
      document.getElementById('speed-display').textContent=`${curr.emoji} ${curr.word} → ?`;
      spawnBubbles();
    } else {
      playFail();flash('fail');
      setScore(score,attempts);
      el.style.background='#ff4d6d';el.style.color='#fff';
      setTimeout(()=>{if(el.parentNode){el.style.background=PC[p];el.style.color=PCT[p];}},350);
    }
  }

  let lastT=0;
  function loop(t){
    if(!active)return;
    const dt=Math.min((t-lastT)/1000,.05);lastT=t;
    bubbles.forEach(b=>{if(!b.active||!b.el)return;b.x-=speed*dt;b.el.style.left=b.x+'px';if(b.x<-110){b.active=false;b.el.remove();}});
    if(bubbles.every(b=>!b.active))spawnBubbles();
    RAF=requestAnimationFrame(loop);
  }

  function endGame(){active=false;if(RAF)cancelAnimationFrame(RAF);clearInterval(timerInt);bubbles.forEach(b=>b.el&&b.el.remove());showResult(score,Math.max(attempts,score),'speed');}

  active=true;spawnBubbles();lastT=performance.now();RAF=requestAnimationFrame(loop);
  timerInt=setInterval(()=>{timer--;const el=document.getElementById('s-timer');if(el)el.textContent=timer;if(timer<=0)endGame();},1000);
  cleanupFn=()=>{active=false;if(RAF)cancelAnimationFrame(RAF);clearInterval(timerInt);};
};

GAMES['subject']=function(){
  setTitle('🔍 Subject Hunter');
  const area=getArea();
  // score counts both subject+pronoun steps, max = sfData.length*2
  let qi=0,score=0,answered=false,sfData=null,currentDif='easy',errThisQ=false;

  function showDifficultyScreen(){
    area.innerHTML=`<div class="game-card" style="text-align:center;">
      <p style="font-family:'Fredoka One',cursive;font-size:1.5rem;margin-bottom:8px;">🔍 Subject Hunter</p>
      <p class="g-instr" style="margin-bottom:24px;">Clicca sul <span>gruppo di parole che fa da soggetto</span> della frase.<br>
      Poi scegli il <span>pronome corretto</span>! (⭐ 1 punto a step)<br>
      Scegli il livello di difficoltà! / Choose your difficulty level!</p>
      <div class="dif-selector">
        <button class="dif-btn dif-easy" onclick="startSubjectGame('easy')">
          <div style="font-size:1.6rem">⭐</div>
          <div>Facile</div>
          <div style="font-size:.8rem;opacity:.7">Soggetto sempre all\'inizio</div>
        </button>
        <button class="dif-btn dif-med" onclick="startSubjectGame('med')">
          <div style="font-size:1.6rem">⭐⭐</div>
          <div>Medio</div>
          <div style="font-size:.8rem;opacity:.7">Frasi più lunghe, soggetto non sempre primo</div>
        </button>
        <button class="dif-btn dif-hard" onclick="startSubjectGame('hard')">
          <div style="font-size:1.6rem">⭐⭐⭐</div>
          <div>Difficile</div>
          <div style="font-size:.8rem;opacity:.7">Parola per parola – seleziona solo il soggetto!</div>
        </button>
      </div></div>`;
  }

  window.startSubjectGame=function(dif){
    const map={easy:SF_EASY,med:SF_MED,hard:SF_HARD};
    sfData=shuffle(map[dif]);qi=0;score=0;answered=false;currentDif=dif;
    setScore(0,sfData.length*2);renderQ();
  };

  // ── shared pronoun step ──────────────────────────────────
  function showPronounStep(q,subjectText,subjectEarned){
    const correct=q.pronoun;
    const wrong3=shuffle(ALL_PRONOUNS.filter(p=>p!==correct)).slice(0,3);
    const choices=shuffle([correct,...wrong3]);
    area.innerHTML=`<div class="game-card">
      <p class="g-instr">Bene! Ora scegli il <span>pronome soggetto</span> corretto per:<br>
      <em style="color:var(--pale-sky);font-size:1.1rem;">“${subjectText}”</em></p>
      <div style="text-align:right;font-size:.82rem;color:var(--dim);margin-bottom:6px;">${qi+1} / ${sfData.length} – step 2</div>
      <div class="choices" id="pr-choices"></div>
      <div id="pr-hint" style="text-align:center;min-height:24px;margin-top:8px;font-size:.92rem;font-weight:700;"></div></div>`;
    const ch=document.getElementById('pr-choices');
    choices.forEach(p=>{
      const b=document.createElement('button');
      b.className='choice';b.style.background=PC[p];b.style.color=PCT[p];b.textContent=p;
      b.addEventListener('click',()=>{
        if(b.dataset.done)return;b.dataset.done='1';
        ch.querySelectorAll('.choice').forEach(x=>x.dataset.done='1');
        if(p===correct){
          b.classList.add('c-ok');score++;setScore(score,sfData.length*2);playOk();flash('ok');
          burst(b.getBoundingClientRect().left+40,b.getBoundingClientRect().top+20,PC[p]);
          document.getElementById('pr-hint').innerHTML='<span style="color:var(--ok)">✅ Corretto! '+correct+' – perfetto!</span>';
          setTimeout(()=>{qi++;renderQ();},750);
        } else {
          b.classList.add('c-fail');
          ch.querySelectorAll('.choice').forEach(x=>{if(x.textContent===correct)x.classList.add('c-ok');});
          playFail();flash('fail');
          document.getElementById('pr-hint').innerHTML=`<span style="color:var(--fail)">❌ Sbagliato! Il pronome corretto era: <strong>${correct}</strong></span>`;
          setTimeout(()=>{qi++;renderQ();},1200);
        }
      });
      ch.appendChild(b);
    });
  }

  // ── easy / med ──────────────────────────────────────────
  function renderQ(){
    if(qi>=sfData.length){showResult(score,sfData.length*2,'subject');return;}
    if(currentDif==='hard'){renderHardQ(sfData[qi]);return;}
    answered=false;errThisQ=false;
    const q=sfData[qi];
    area.innerHTML=`<div class="game-card">
      <p class="g-instr">Clicca sul <span>gruppo di parole soggetto</span>! Chi o cosa compie l\'azione?<br>
      <em>Hint: ${q.hint}</em></p>
      <div style="text-align:right;font-size:.82rem;color:var(--dim);margin-bottom:6px;">${qi+1} / ${sfData.length} – step 1</div>
      <div class="progress-strip" id="sf-prog"></div>
      <div class="sf-sent" id="sf-sent"></div>
      <div class="sf-hint" id="sf-hint">&nbsp;</div></div>`;
    const prog=document.getElementById('sf-prog');
    for(let i=0;i<sfData.length;i++){const d=document.createElement('div');d.className='prog-dot'+(i<qi?' done':i===qi?' curr':'');prog.appendChild(d);}
    const sent=document.getElementById('sf-sent');
    q.groups.forEach((grp,gi)=>{
      const pill=document.createElement('div');pill.className='word-pill';
      pill.textContent=grp.join(' ');
      pill.addEventListener('click',()=>handleClick(gi,pill,q));
      sent.appendChild(pill);
    });
  }

  function handleClick(gi,pill,q){
    if(answered)return;answered=true;
    if(gi===q.si){
      pill.classList.add('ok');
      if(!errThisQ){score++;}
      setScore(score,sfData.length*2);playOk();flash('ok');
      burst(pill.getBoundingClientRect().left+pill.offsetWidth/2,pill.getBoundingClientRect().top+20,PC.she);
      const subjectText=q.groups[q.si].join(' ');
      const msg=errThisQ
        ?'<span style="color:var(--peach-fuzz)">✅ Trovato! Ma hai sbagliato prima – nessun punto. Ora scegli il pronome!</span>'
        :'<span style="color:var(--ok)">✅ Corretto! Ora scegli il pronome!</span>';
      document.getElementById('sf-hint').innerHTML=msg;
      setTimeout(()=>showPronounStep(q,subjectText,!errThisQ),700);
    } else {
      errThisQ=true;
      pill.classList.add('fail','shake');playFail();flash('fail');
      document.getElementById('sf-hint').innerHTML='<span style="color:var(--fail)">❌ Sbagliato! Nessun punto se sbagli. Riprova!</span>';
      setTimeout(()=>{pill.classList.remove('fail','shake');answered=false;},700);
    }
  }

  // ── hard ────────────────────────────────────────────────
  function renderHardQ(q){
    answered=false;errThisQ=false;
    const subjectSet=new Set(q.subject);
    const selectedSet=new Set();
    area.innerHTML=`<div class="game-card">
      <p class="g-instr">Clicca su <span>tutte e sole le parole del soggetto</span>, poi premi ➡️ Avanti!<br>
      <em>${q.hint}</em></p>
      <div style="text-align:right;font-size:.82rem;color:var(--dim);margin-bottom:6px;">${qi+1} / ${sfData.length} – step 1</div>
      <div class="progress-strip" id="sf-prog"></div>
      <div class="sf-sent" id="sf-sent"></div>
      <div class="sf-hint" id="sf-hint">&nbsp;</div>
      <div style="text-align:center;margin-top:16px;">
        <button class="btn-ok btn-primary-game" id="sf-confirm">➡️ Avanti</button>
      </div></div>`;
    const prog=document.getElementById('sf-prog');
    for(let i=0;i<sfData.length;i++){const d=document.createElement('div');d.className='prog-dot'+(i<qi?' done':i===qi?' curr':'');prog.appendChild(d);}
    const sent=document.getElementById('sf-sent');
    q.words.forEach((word,idx)=>{
      const pill=document.createElement('div');pill.className='word-pill';
      pill.textContent=word;
      pill.addEventListener('click',()=>{
        if(answered)return;
        if(selectedSet.has(idx)){selectedSet.delete(idx);pill.classList.remove('sel');}
        else{selectedSet.add(idx);pill.classList.add('sel');}
      });
      sent.appendChild(pill);
    });
    document.getElementById('sf-confirm').addEventListener('click',()=>{
      if(answered)return;
      if(selectedSet.size===0){document.getElementById('sf-hint').innerHTML='<span style="color:var(--peach-fuzz)">⚠️ Seleziona almeno una parola prima di confermare!</span>';return;}
      answered=true;
      const correct=selectedSet.size===subjectSet.size&&[...selectedSet].every(i=>subjectSet.has(i));
      const pills=sent.querySelectorAll('.word-pill');
      const subjectText=q.subject.map(i=>q.words[i]).join(' ');
      if(correct){
        pills.forEach((pill,idx)=>{pill.classList.remove('sel');if(subjectSet.has(idx))pill.classList.add('ok');});
        score++;setScore(score,sfData.length*2);playOk();flash('ok');
        burst(sent.getBoundingClientRect().left+sent.offsetWidth/2,sent.getBoundingClientRect().top+20,PC.she);
        document.getElementById('sf-hint').innerHTML='<span style="color:var(--ok)">✅ Perfetto! Ora scegli il pronome!</span>';
        setTimeout(()=>showPronounStep(q,subjectText,true),700);
      } else {
        pills.forEach((pill,idx)=>{pill.classList.remove('sel');if(subjectSet.has(idx))pill.classList.add('ok');else if(selectedSet.has(idx))pill.classList.add('fail');});
        playFail();flash('fail');
        document.getElementById('sf-hint').innerHTML='<span style="color:var(--fail)">❌ Non esatto! Verde = soggetto corretto. Ora prova il pronome!</span>';
        setTimeout(()=>showPronounStep(q,subjectText,false),2000);
      }
    });
  }

  showDifficultyScreen();cleanupFn=null;
};

const END_TEXTC={s:PCT.I,es:PCT.he,ies:PCT.she,'—':'#9090b8'};

GAMES['s-catch']=function(){
  setTitle('🎯 Acchiappa il Finale!');
  const area=getArea();
  const qs=shuffle(SCATCH_DATA).slice(0,12);
  let qi=0,score=0,lives=3,RAF=null,active=false,endEls=[],roundLocked=false;
  setScore(0,qs.length);setLives(3);

  area.innerHTML=`<div class="game-card">
    <p class="g-instr">Clicca sul <span>finale corretto</span> prima che tocchi terra!<br>
    <em>— significa "nessuna S necessaria" (forma base)</em></p>

      <div class="verb-target" id="verb-target">–</div>

  const prog=document.getElementById('sc-prog');

  function showAnswerOverlay(arena,q,callback){
    const ov=document.createElement('div');ov.className='catch-overlay';

      <div class="catch-overlay-rule">📚 Regola: ${q.rule}</div>`;

    setTimeout(()=>{ov.remove();callback();},2200);
  }

  function startRound(){
    if(qi>=qs.length){endGame();return;}
    roundLocked=false;
    const q=qs[qi];

    const arenaW=arena.clientWidth||360;
    const shuffled=shuffle(ALL_ENDINGS);

      if(!active)return;
      const dt=Math.min((t-lt)/1000,.05);lt=t;
      const arena=document.getElementById('scatch-arena');
      if(!arena){active=false;return;}
      const arenaH=arena.clientHeight||380;
      endEls.forEach(b=>{
        if(!b.active||!b.el)return;
        b.y+=b.speed*dt;b.el.style.top=b.y+'px';
        if(b.y>=arenaH-90){
          b.active=false;
          if(!roundLocked){
            // An ending hit the ground
            roundLocked=true;
            active=false;cancelAnimationFrame(RAF);
            endEls.forEach(e=>e.el&&e.el.remove());
            const q=qs[qi];
            if(b.ending===q.correct){
              // correct one landed (player didn't click it in time)
              // treat as miss - show answer
              lives--;setLives(lives);playFail();flash('fail');
              if(lives<=0){showResult(score,qs.length,'s-catch');return;}
              showAnswerOverlay(document.getElementById('scatch-arena'),q,()=>{qi++;updateProg();active=true;loopStart();startRound();});
            } else {
              // wrong one landed (should have been clicked)
              lives--;setLives(lives);playFail();flash('fail');
              if(lives<=0){showResult(score,qs.length,'s-catch');return;}
              showAnswerOverlay(document.getElementById('scatch-arena'),q,()=>{qi++;updateProg();active=true;loopStart();startRound();});
            }
          } else { b.el&&b.el.remove(); }
        }
      });
      RAF=requestAnimationFrame(loop);
    }
    RAF=requestAnimationFrame(loop);
  }

  function handleEndClick(end,el,q){
    if(roundLocked)return;
    roundLocked=true;
    active=false;cancelAnimationFrame(RAF);
    if(end===q.correct){
      // Correct!
      el.classList.add('exploding');
      const fe=document.getElementById('filled-end');if(fe)fe.textContent=end;
      score++;setScore(score,qs.length);playOk();flash('ok');
      burst(el.getBoundingClientRect().left+36,el.getBoundingClientRect().top+36,END_COLORS[end]);
      setTimeout(()=>{
        endEls.forEach(b=>b.el&&b.el.remove());
        qi++;updateProg();active=true;loopStart();startRound();
      },550);
    } else {
      // Wrong - explode it, lose life, show overlay
      el.classList.add('exploding');
      lives--;setLives(lives);playFail();flash('fail');
      if(lives<=0){
        setTimeout(()=>{endEls.forEach(b=>b.el&&b.el.remove());showResult(score,qs.length,'s-catch');},400);
        return;
      }
      setTimeout(()=>{
        endEls.forEach(b=>b.el&&b.el.remove());
        const arena=document.getElementById('scatch-arena');
        if(arena)showAnswerOverlay(arena,q,()=>{qi++;updateProg();active=true;loopStart();startRound();});
      },400);
    }
  }

  function endGame(){
    active=false;if(RAF)cancelAnimationFrame(RAF);
    endEls.forEach(b=>b.el&&b.el.remove());
    showResult(score,qs.length,'s-catch');
  }

  startRound();
  cleanupFn=()=>{active=false;if(RAF)cancelAnimationFrame(RAF);endEls.forEach(b=>b.el&&b.el.remove());};
};

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  document.body.addEventListener('pointerdown',()=>{try{getAudio().resume();}catch(e){}},{once:true});
});
</script>
